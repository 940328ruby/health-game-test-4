<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>健康小勇者遊戲</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      background: #041126;
      color: white;
      user-select: none;
    }
    body {
      background:
        radial-gradient(circle at 20% 20%, rgba(37, 99, 235, .22), transparent 28%),
        radial-gradient(circle at 82% 32%, rgba(14, 165, 233, .16), transparent 28%),
        linear-gradient(135deg, #020617 0%, #071a3b 52%, #082f49 100%);
    }
    #app { position: relative; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100vw; height: 100vh; outline: none; }
    .hud {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      z-index: 5;
      pointer-events: none;
    }
    .pill {
      background: rgba(15, 23, 42, .78);
      border: 1px solid rgba(148, 163, 184, .28);
      padding: 9px 15px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      font-weight: 700;
      white-space: nowrap;
    }
    .pill strong { color: #facc15; }
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, .76);
      backdrop-filter: blur(10px);
      padding: 24px;
    }
    .card {
      width: min(760px, 92vw);
      max-height: 92vh;
      overflow: auto;
      background: linear-gradient(180deg, rgba(15,23,42,.98), rgba(12,31,65,.98));
      border: 1px solid rgba(125,211,252,.28);
      border-radius: 26px;
      box-shadow: 0 28px 90px rgba(0,0,0,.45);
      padding: 28px;
    }
    h1, h2, h3 { margin: 0 0 12px; line-height: 1.25; }
    h1 { font-size: clamp(30px, 4vw, 48px); color: #facc15; }
    h2 { color: #7dd3fc; }
    p, li { color: #dbeafe; line-height: 1.75; }
    .muted { color: #93c5fd; font-size: 14px; }
    .kbd {
      display: inline-block;
      padding: 2px 8px;
      margin: 0 2px;
      border-radius: 8px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      font-weight: 800;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 18px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      color: #082f49;
      background: linear-gradient(135deg, #facc15, #fb923c);
      box-shadow: 0 12px 28px rgba(250,204,21,.18);
    }
    button:hover { filter: brightness(1.06); }
    .level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 16px 0;
    }
    .level-box {
      padding: 14px;
      border-radius: 18px;
      background: rgba(14,165,233,.09);
      border: 1px solid rgba(125,211,252,.2);
    }
    .level-box b { color: #fef08a; }
    .options { display: grid; gap: 10px; margin-top: 16px; }
    .option-btn {
      width: 100%;
      text-align: left;
      color: #eff6ff;
      background: rgba(15,23,42,.86);
      border: 1px solid rgba(125,211,252,.25);
      box-shadow: none;
      font-weight: 800;
    }
    .option-btn.correct { background: rgba(22,163,74,.48); border-color: #86efac; }
    .option-btn.wrong { background: rgba(220,38,38,.45); border-color: #fca5a5; }
    .feedback {
      margin-top: 16px;
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(2,6,23,.48);
      border: 1px solid rgba(148,163,184,.2);
      display: none;
    }
    .feedback.show { display: block; }
    .hidden { display: none !important; }
    @media (max-width: 900px) {
      .level-grid { grid-template-columns: 1fr; }
      .hud { width: 94vw; }
      .pill { font-size: 12px; padding: 7px 10px; }
      .card { padding: 20px; border-radius: 22px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game" tabindex="0"></canvas>
    <div class="hud">
      <div class="pill">玩家：<strong>健康小勇者</strong></div>
      <div class="pill">關卡：<strong id="hudLevel">1（簡易）</strong></div>
      <div class="pill">發光膠囊：<strong id="hudPower">0 / 1</strong></div>
      <div class="pill">分數：<strong id="hudScore">0</strong></div>
    </div>

    <section id="startOverlay" class="overlay">
      <div class="card">
        <h1>健康小勇者遊戲</h1>
        <p>用鍵盤 <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span> 或 <span class="kbd">↑</span><span class="kbd">↓</span><span class="kbd">←</span><span class="kbd">→</span> 操控健康小勇者，吃掉健康星星跟發光膠囊過關吧！<br>過程中要記得避開跑來跑去的細菌怪們！</p>
        <div class="level-grid">
          <div class="level-box"><b>第一關目標</b><br>吃掉 1 個發光膠囊</div>
          <div class="level-box"><b>第二關目標</b><br>吃掉 3 個發光膠囊</div>
          <div class="level-box"><b>第三關目標</b><br>吃掉 5 個發光膠囊</div>
        </div>
        <button id="startGameBtn">開始遊戲</button>
      </div>
    </section>

    <section id="questionOverlay" class="overlay hidden">
      <div class="card">
        <p class="muted" id="questionMeta">健康知識題</p>
        <h2 id="questionText">題目</h2>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="continueBtn" class="hidden" style="margin-top:14px;">繼續遊戲</button>
      </div>
    </section>

    <section id="resultOverlay" class="overlay hidden">
      <div class="card">
        <h1 id="resultTitle">挑戰結果</h1>
        <p id="resultText"></p>
        <button id="restartBtn">重新挑戰</button>
      </div>
    </section>
  </div>

  <script>
    const questionBank = [
      { level: 1, topic: "均衡飲食", q: "「我的餐盤」把每日飲食分成幾大類食物？", options: ["3大類", "4大類", "6大類", "8大類"], answer: 2, explain: "臺灣版「我的餐盤」包含全穀雜糧、豆魚蛋肉、乳品、蔬菜、水果、油脂與堅果種子等6大類，重點是多樣且均衡。" },
      { level: 1, topic: "我的餐盤", q: "依照「我的餐盤」口訣，下列哪一項最接近建議？", options: ["每天早晚一杯奶", "每餐只吃肉", "完全不吃水果", "把含糖飲料當水喝"], answer: 0, explain: "「我的餐盤」強調每天早晚一杯奶、每餐水果拳頭大、菜比水果多一點、飯跟蔬菜一樣多等概念。" },
      { level: 1, topic: "身體活動", q: "成人健康管理常見建議是每週累積多少中等強度身體活動？", options: ["30分鐘", "60分鐘", "150分鐘", "600分鐘"], answer: 2, explain: "成人可從每週累積150分鐘中等強度活動開始，例如快走、騎腳踏車等。" },
      { level: 1, topic: "運動強度", q: "哪一種描述比較符合中等強度運動？", options: ["完全不喘，可以唱歌", "還能說話，但不容易唱歌", "完全不能說話", "坐著滑手機"], answer: 1, explain: "中等強度運動通常會讓心跳和呼吸變快，還能說話，但不太能唱歌。" },
      { level: 1, topic: "手部衛生", q: "預防腸病毒最重要的日常方法之一是什麼？", options: ["只用香水噴手", "用肥皂或洗手乳正確洗手", "吃很多甜食", "只在生病後才洗手"], answer: 1, explain: "腸病毒傳染力強，返家、進食前、如廁後都應落實正確洗手。" },
      { level: 1, topic: "洗手時機", q: "下列哪一個時機特別需要洗手？", options: ["吃東西前", "剛洗完手立刻再洗", "睡覺時", "看電視時每分鐘洗一次"], answer: 0, explain: "用餐前、如廁後、外出返家後、接觸分泌物後，都是重要的洗手時機。" },
      { level: 1, topic: "口腔健康", q: "下列哪一個行為會增加口腔癌風險？", options: ["規律刷牙", "嚼檳榔", "多喝白開水", "使用牙線"], answer: 1, explain: "檳榔本身就是一級致癌物，嚼檳榔會增加口腔癌風險。" },
      { level: 1, topic: "飲水習慣", q: "下列哪一種飲品最適合作為日常主要補充水分來源？", options: ["白開水", "含糖手搖飲", "能量飲料", "高糖汽水"], answer: 0, explain: "日常補水以白開水為主較健康，含糖飲料容易增加糖分與熱量攝取。" },
      { level: 1, topic: "睡眠健康", q: "維持良好睡眠較適合的做法是什麼？", options: ["每天睡前大量喝咖啡", "固定作息並減少睡前滑手機", "連續熬夜補進度", "睡前劇烈爭吵"], answer: 1, explain: "固定作息、睡前放鬆、減少螢幕刺激，有助於維持睡眠品質。" },
      { level: 1, topic: "心理健康", q: "當感到壓力時，下列哪一種做法較健康？", options: ["長期忽略壓力", "規律作息並找可信任的人談談", "完全不睡覺", "只靠熬夜打電動紓壓"], answer: 1, explain: "心理健康可從規律作息、適度活動、情緒覺察與尋求支持開始。" },
      { level: 1, topic: "飲食衛生", q: "用餐及喝水前，較好的衛生習慣是什麼？", options: ["不用洗手", "用乾淨流動水和肥皂洗手", "只擦衣服", "只沖一下手背"], answer: 1, explain: "用餐與喝水前應落實正確洗手，能降低經由手部接觸造成感染的風險。" },
      { level: 1, topic: "蔬果攝取", q: "下列哪一項比較符合健康飲食概念？", options: ["蔬菜和水果都要攝取", "只吃零食不吃正餐", "完全不吃蔬菜", "水果可以完全取代蔬菜"], answer: 0, explain: "蔬菜和水果提供不同營養素，健康飲食強調多樣化攝取。" },
      { level: 2, topic: "健康體位", q: "若想控制體重，最完整的做法通常是什麼？", options: ["只靠單次大量運動", "完全不吃主食", "規律身體活動並搭配健康飲食", "只喝含糖飲料補充體力"], answer: 2, explain: "健康體位管理需要搭配均衡飲食、規律活動與良好生活習慣。" },
      { level: 2, topic: "腸病毒", q: "關於腸病毒環境消毒，下列哪一項較正確？", options: ["酒精對腸病毒效果有限", "只要開冷氣就能殺死病毒", "灰塵越多越安全", "完全不用清潔玩具"], answer: 0, explain: "酒精對腸病毒效果有限，幼兒常接觸物品應定期清潔消毒。" },
      { level: 2, topic: "登革熱", q: "預防登革熱最重要的環境行動之一是什麼？", options: ["清除積水容器", "把水桶裝滿水放著", "只在室內點香", "完全不處理花盆底盤"], answer: 0, explain: "登革熱防治重點是巡、倒、清、刷，清除積水容器，降低病媒蚊孳生機會。" },
      { level: 2, topic: "防蚊行動", q: "住家附近若有不用的空瓶、空罐，較好的做法是什麼？", options: ["任其積水", "倒掉積水並清除容器", "放更多水養蚊子", "只用紙蓋住"], answer: 1, explain: "容器積水容易成為病媒蚊孳生處，應定期清除積水與不用容器。" },
      { level: 2, topic: "心理健康", q: "下列哪一項比較能幫助維持心理健康？", options: ["長期封閉自己", "保持規律生活、適度活動與社會支持", "每天熬夜到很晚", "遇到壓力只責怪自己"], answer: 1, explain: "規律作息、適度活動、與人連結和必要時求助，都是重要保護因子。" },
      { level: 2, topic: "飲食", q: "下列哪一種飲食選擇較符合健康飲食原則？", options: ["蔬果多樣化，選擇全穀", "每天只吃油炸食物", "完全不吃蔬菜", "用含糖飲料代替水"], answer: 0, explain: "健康飲食可從多樣蔬果、全穀未精製雜糧、優質蛋白質、減少高油高鹽高糖開始。" },
      { level: 2, topic: "菸害防制", q: "關於吸菸，下列哪一項較正確？", options: ["吸菸只影響牙齒顏色", "吸菸會增加多種疾病風險", "少量吸菸完全無風險", "吸菸可以提升肺功能"], answer: 1, explain: "吸菸會危害呼吸系統、心血管系統，也與多種癌症風險有關。" },
      { level: 2, topic: "口腔癌警訊", q: "若口腔出現長期不癒合的破皮、硬塊或異常斑塊，較適合怎麼做？", options: ["忽略它", "自己亂刮掉", "盡快就醫檢查", "只喝冰水"], answer: 2, explain: "口腔若出現長期不癒合破皮、斑塊或硬塊，應儘快就醫檢查。" },
      { level: 2, topic: "用藥安全", q: "服用藥物時，下列哪一項較安全？", options: ["自行加倍劑量", "依照醫囑或藥袋指示使用", "吃別人的藥", "把多種藥混在一起不確認"], answer: 1, explain: "用藥應遵照醫囑或藥袋指示，不應任意加量、停藥或服用他人藥物。" },
      { level: 2, topic: "食品標示", q: "購買包裝食品時，哪一項資訊值得注意？", options: ["有效日期與營養標示", "包裝越亮越健康", "只看廣告詞", "完全不用看標示"], answer: 0, explain: "有效日期、保存方式、成分與營養標示，有助於做出較健康與安全的選擇。" },
      { level: 2, topic: "視力保健", q: "長時間近距離用眼時，較好的做法是什麼？", options: ["一直盯著螢幕不休息", "適度休息並增加戶外活動", "在很暗的地方看書", "越近看越清楚"], answer: 1, explain: "規律休息、保持適當距離與增加戶外活動，有助於視力保健。" },
      { level: 3, topic: "健康資訊辨識", q: "看到網路健康偏方時，最適合的做法是什麼？", options: ["馬上照做並轉傳", "只看標題就相信", "查證來源，優先參考政府或專業醫療機構資訊", "越誇張越可信"], answer: 2, explain: "健康資訊應查證來源與證據，優先參考政府衛生單位、醫療院所或專業健康資訊。" },
      { level: 3, topic: "運動", q: "若一次無法運動30分鐘，較可行的方式是什麼？", options: ["完全放棄運動", "分次累積，例如每次10分鐘以上", "只在月底一次運動很久", "只看運動影片不動"], answer: 1, explain: "若一次無法達到30分鐘，可分次累積身體活動，重點是規律且總量達標。" },
      { level: 3, topic: "檳榔迷思", q: "關於檳榔，下列哪一項正確？", options: ["沒有加紅白灰就完全不會致癌", "吐掉檳榔汁就沒有風險", "檳榔本身就是一級致癌物", "嚼檳榔可以保護牙齦"], answer: 2, explain: "檳榔本身就是一級致癌物，不論有無添加物都可能增加口腔癌風險。" },
      { level: 3, topic: "飲食衛生", q: "外食時，下列哪一項較能降低飲食衛生風險？", options: ["選擇注重衛生的店家並落實洗手", "吃飯前不用洗手", "共飲共食不使用公筷母匙", "生水看起來乾淨就直接喝"], answer: 0, explain: "外食可選擇注重衛生的店家，並在用餐前洗手，降低感染風險。" },
      { level: 3, topic: "慢性病預防", q: "預防慢性病較重要的生活方式包含哪一項？", options: ["規律活動、均衡飲食、定期健康檢查", "每天暴飲暴食", "完全不活動", "只靠保健食品"], answer: 0, explain: "慢性病預防重視長期生活型態，包含健康飲食、規律活動、體重管理與定期檢查。" },
      { level: 3, topic: "疫苗觀念", q: "關於疫苗，下列哪一項較正確？", options: ["所有疫苗都完全不需評估", "疫苗接種可降低特定疾病重症風險", "打疫苗一定會得到該疾病", "疫苗都沒有任何作用"], answer: 1, explain: "疫苗接種可協助身體建立保護力，降低特定疾病感染、重症或併發症風險。" },
      { level: 3, topic: "熱傷害預防", q: "炎熱天氣進行戶外活動時，哪一項較能預防熱傷害？", options: ["補充水分並避免長時間曝曬", "完全不喝水", "穿厚重不透氣衣物", "只喝高糖飲料"], answer: 0, explain: "高溫環境應補充水分、適度休息、注意遮陽與通風，降低熱傷害風險。" },
      { level: 3, topic: "壓力調適", q: "面對長期壓力時，下列哪一項比較適合？", options: ["覺察壓力來源並尋求支持", "完全否認壓力", "只靠熬夜硬撐", "把所有問題都怪自己"], answer: 0, explain: "壓力調適可從覺察壓力來源、規劃可行行動、放鬆練習與尋求支持開始。" },
      { level: 3, topic: "癌症篩檢", q: "關於癌症篩檢，下列哪一項較正確？", options: ["符合條件者可依建議定期篩檢", "沒有症狀就永遠不用管", "篩檢可以取代所有治療", "篩檢結果不用看"], answer: 0, explain: "符合條件者可依建議定期篩檢，早期發現有助於後續處理與治療。" }
    ];

    const maze = [
      "#####################",
      "#.........#.........#",
      "#.###.###.#.###.###.#",
      "#.#.............#...#",
      "#.#.###.#.###.#.#.#.#",
      "#.....#.#...#.#.....#",
      "###.#.#.###.#.#.#.###",
      "#...#.....#.....#...#",
      "#.#####.#.#.#.#####.#",
      "#.......#...#.......#",
      "###.#.###.#.###.#.###",
      "#...#.....#.....#...#",
      "#.#####.#.#.#.#####.#",
      "#.....#.#...#.#.....#",
      "#.#.#.#.###.#.#.#.#.#",
      "#.#.............#...#",
      "#.###.###.#.###.###.#",
      "#.........#.........#",
      "#####################"
    ];

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const startOverlay = document.getElementById("startOverlay");
    const questionOverlay = document.getElementById("questionOverlay");
    const resultOverlay = document.getElementById("resultOverlay");
    const hudLevel = document.getElementById("hudLevel");
    const hudPower = document.getElementById("hudPower");
    const hudScore = document.getElementById("hudScore");
    const questionMeta = document.getElementById("questionMeta");
    const questionText = document.getElementById("questionText");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const continueBtn = document.getElementById("continueBtn");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");

    const levels = [
      // 三關差異只保留「細菌數量」與「移動速度」：移動範圍與巡邏邏輯三關都一樣大。
      { label: "簡易", need: 1, ghosts: 2, ghostSpeed: 2.05 },
      { label: "中等", need: 3, ghosts: 3, ghostSpeed: 2.38 },
      { label: "困難", need: 5, ghosts: 4, ghostSpeed: 2.7 }
    ];

    const state = {
      level: 1,
      score: 0,
      powerGot: 0,
      running: false,
      paused: true,
      cell: 32,
      ox: 0,
      oy: 0,
      dots: new Set(),
      powers: [],
      usedQuestions: new Set(),
      recentQuestions: JSON.parse(localStorage.getItem("healthMazeRecentQuestions") || "[]"),
      currentQuestion: null,
      lastAnswerCorrect: false,
      player: null,
      ghosts: [],
      lastTime: 0
    };

    const DIRS = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };
    const ALL_DIRS = [DIRS.right, DIRS.left, DIRS.down, DIRS.up];

    function resize() {
      canvas.width = Math.floor(window.innerWidth * devicePixelRatio);
      canvas.height = Math.floor(window.innerHeight * devicePixelRatio);
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      const cols = maze[0].length;
      const rows = maze.length;
      const maxW = Math.min(window.innerWidth * 0.68, 900);
      const maxH = window.innerHeight - 170;
      state.cell = Math.max(24, Math.min(maxW / cols, maxH / rows));
      state.ox = (window.innerWidth - cols * state.cell) / 2;
      state.oy = Math.max(108, (window.innerHeight - rows * state.cell) / 2 + 42);
    }
    window.addEventListener("resize", resize);
    resize();

    function isWallCell(c, r) {
      if (r < 0 || r >= maze.length || c < 0 || c >= maze[0].length) return true;
      return maze[r][c] === "#";
    }
    function cellOf(e) { return { c: Math.floor(e.x), r: Math.floor(e.y) }; }
    function atCenter(e) { return Math.abs(e.x - (Math.floor(e.x) + 0.5)) < 0.04 && Math.abs(e.y - (Math.floor(e.y) + 0.5)) < 0.04; }
    function snap(e) { e.x = Math.floor(e.x) + 0.5; e.y = Math.floor(e.y) + 0.5; }
    function canMove(e, dir) {
      const nextC = Math.floor(e.x + dir.x * 0.55);
      const nextR = Math.floor(e.y + dir.y * 0.55);
      return !isWallCell(nextC, nextR);
    }
    function px(x) { return state.ox + x * state.cell; }
    function py(y) { return state.oy + y * state.cell; }

    function openCells() {
      const cells = [];
      for (let r = 1; r < maze.length - 1; r++) {
        for (let c = 1; c < maze[0].length - 1; c++) {
          if (!isWallCell(c, r)) cells.push({ c, r });
        }
      }
      return cells;
    }

    function nearestOpen(c, r) {
      if (!isWallCell(c, r)) return { c, r };
      let best = null;
      let bestD = Infinity;
      for (const cell of openCells()) {
        const d = Math.abs(cell.c - c) + Math.abs(cell.r - r);
        if (d < bestD) { bestD = d; best = cell; }
      }
      return best;
    }

    function buildDots() {
      state.dots.clear();
      for (const cell of openCells()) state.dots.add(`${cell.c},${cell.r}`);
      ["1,1", "9,9", "11,9", "9,11", "11,11"].forEach(k => state.dots.delete(k));
    }

    function choosePowerCells(count) {
      const all = openCells()
        .filter(cell => Math.abs(cell.c - 1) + Math.abs(cell.r - 1) >= 15)
        .filter(cell => !(cell.c >= 8 && cell.c <= 12 && cell.r >= 8 && cell.r <= 12));
      const selected = [];
      while (selected.length < count && all.length) {
        let best = all[0], bestScore = -1;
        for (const cell of all) {
          const distStart = Math.abs(cell.c - 1) + Math.abs(cell.r - 1);
          const distOthers = selected.length ? Math.min(...selected.map(s => Math.abs(s.c - cell.c) + Math.abs(s.r - cell.r))) : 20;
          const score = distStart + distOthers * 2 + Math.random();
          if (score > bestScore) { bestScore = score; best = cell; }
        }
        selected.push(best);
        all.splice(all.findIndex(x => x.c === best.c && x.r === best.r), 1);
      }
      return selected;
    }

    function placePowers() {
      state.powers = choosePowerCells(levels[state.level - 1].need).map(cell => ({ c: cell.c, r: cell.r, active: true, pulse: Math.random() * 10 }));
      for (const p of state.powers) state.dots.delete(`${p.c},${p.r}`);
    }

    function resetLevel() {
      const start = nearestOpen(1, 1);
      state.player = { x: start.c + 0.5, y: start.r + 0.5, dir: { x: 0, y: 0 }, nextDir: null, speed: 3.6, anim: 0 };
      state.powerGot = 0;
      state.ghosts = [];
      const centers = [nearestOpen(9, 9), nearestOpen(11, 9), nearestOpen(9, 11), nearestOpen(11, 11)];
      // 每一關都使用同一組「大範圍巡邏目標」，差別只在細菌數量與速度。
      // 這些點分散在迷宮四角與遠端通道，避免第一、二關只在中央小範圍移動。
      const patrolTargets = [
        nearestOpen(17, 1),
        nearestOpen(1, 17),
        nearestOpen(17, 17),
        nearestOpen(3, 3),
        nearestOpen(15, 15),
        nearestOpen(5, 13),
        nearestOpen(13, 5),
        nearestOpen(7, 17)
      ];
      const setting = levels[state.level - 1];
      for (let i = 0; i < setting.ghosts; i++) {
        const c = centers[i];
        state.ghosts.push({
          x: c.c + 0.5,
          y: c.r + 0.5,
          dir: ALL_DIRS[i],
          speed: setting.ghostSpeed,
          type: i,
          target: patrolTargets[i % patrolTargets.length],
          scatterTimer: 1.5 + i * 0.7,
          targetIndex: i % patrolTargets.length
        });
      }
      buildDots();
      placePowers();
      updateHUD();
    }

    function updateHUD() {
      const level = levels[state.level - 1];
      hudLevel.textContent = `${state.level}（${level.label}）`;
      hudPower.textContent = `${state.powerGot} / ${level.need}`;
      hudScore.textContent = state.score;
    }

    function moveEntity(e, dt) {
      if (atCenter(e)) {
        snap(e);
        if (e.nextDir && canMove(e, e.nextDir)) e.dir = { ...e.nextDir };
        if (!canMove(e, e.dir)) e.dir = { x: 0, y: 0 };
      }
      if (e.dir.x === 0 && e.dir.y === 0) return;
      const nx = e.x + e.dir.x * e.speed * dt;
      const ny = e.y + e.dir.y * e.speed * dt;
      const probeC = Math.floor(nx + e.dir.x * 0.40);
      const probeR = Math.floor(ny + e.dir.y * 0.40);
      if (!isWallCell(probeC, probeR)) { e.x = nx; e.y = ny; }
      else { snap(e); e.dir = { x: 0, y: 0 }; }
    }

    function setDirection(name) {
      if (!state.player) return;
      const dir = DIRS[name];
      state.player.nextDir = dir;
      if (atCenter(state.player) && canMove(state.player, dir)) {
        snap(state.player);
        state.player.dir = { ...dir };
      }
    }

    function randomFarTarget(fromCell) {
      const candidates = openCells().filter(cell => Math.abs(cell.c - fromCell.c) + Math.abs(cell.r - fromCell.r) >= 10);
      return candidates[Math.floor(Math.random() * candidates.length)] || nearestOpen(10, 9);
    }

    function nextPatrolTarget(g) {
      const patrolTargets = [
        nearestOpen(17, 1), nearestOpen(1, 17), nearestOpen(17, 17), nearestOpen(3, 3),
        nearestOpen(15, 15), nearestOpen(5, 13), nearestOpen(13, 5), nearestOpen(7, 17)
      ];
      g.targetIndex = ((g.targetIndex || 0) + 1 + g.type) % patrolTargets.length;
      return patrolTargets[g.targetIndex];
    }

    function chooseGhostDir(g) {
      let possible = ALL_DIRS.filter(d => canMove(g, d));
      const reverse = { x: -g.dir.x, y: -g.dir.y };
      if (possible.length > 1) possible = possible.filter(d => !(d.x === reverse.x && d.y === reverse.y));

      const gc = cellOf(g);
      const currentTarget = g.target || nextPatrolTarget(g);
      const reachedTarget = Math.abs(gc.c - currentTarget.c) + Math.abs(gc.r - currentTarget.r) <= 1;
      if (reachedTarget) g.target = nextPatrolTarget(g);

      // 三關都採用大範圍巡邏：主要往遠方巡邏點移動，偶爾才追小勇者。
      let target = g.target;
      if (Math.random() < 0.16) target = cellOf(state.player);

      possible.sort((a, b) => {
        const da = Math.abs(target.c - (gc.c + a.x)) + Math.abs(target.r - (gc.r + a.y));
        const db = Math.abs(target.c - (gc.c + b.x)) + Math.abs(target.r - (gc.r + b.y));
        return da - db;
      });

      if (Math.random() < 0.18 && possible.length > 1) {
        return possible[Math.floor(Math.random() * Math.min(2, possible.length))];
      }
      return possible[0] || { x: 0, y: 0 };
    }

    function moveGhosts(dt) {
      for (const g of state.ghosts) {
        g.scatterTimer -= dt;
        if (g.scatterTimer <= 0) {
          // 定期指定下一個遠方巡邏點，讓第一、二關也會跑遍迷宮。
          g.target = nextPatrolTarget(g);
          g.scatterTimer = 4.5 + Math.random() * 2.5;
        }
        if (atCenter(g)) {
          snap(g);
          g.dir = chooseGhostDir(g);
        }
        moveEntity(g, dt);
        if (g.dir.x === 0 && g.dir.y === 0) {
          g.target = nextPatrolTarget(g);
          g.dir = chooseGhostDir(g);
        }
      }
    }

    function checkCollectibles() {
      const cell = cellOf(state.player);
      const key = `${cell.c},${cell.r}`;
      if (state.dots.has(key)) { state.dots.delete(key); state.score += 10; }
      const power = state.powers.find(p => p.active && p.c === cell.c && p.r === cell.r);
      if (power) { power.active = false; openQuestion(power); }
      updateHUD();
    }

    function checkCollision() {
      if (!state.running || state.paused) return;
      for (const g of state.ghosts) {
        if (Math.hypot(state.player.x - g.x, state.player.y - g.y) < 0.58) { endGame(false); return; }
      }
    }

    function pickQuestion() {
      const allowed = questionBank.map((q, i) => ({ q, i })).filter(item => item.q.level <= state.level).map(item => item.i);
      let available = allowed.filter(i => !state.usedQuestions.has(i));
      if (!available.length) {
        // 同一次挑戰先盡量不重複；真的用完才重新開放。
        state.usedQuestions.clear();
        available = [...allowed];
      }

      const recentSet = new Set(state.recentQuestions || []);
      const lessRecent = available.filter(i => !recentSet.has(i));
      const pool = lessRecent.length ? lessRecent : available;
      const chosen = pool[Math.floor(Math.random() * pool.length)];
      state.usedQuestions.add(chosen);

      state.recentQuestions = [chosen, ...(state.recentQuestions || []).filter(i => i !== chosen)].slice(0, 12);
      localStorage.setItem("healthMazeRecentQuestions", JSON.stringify(state.recentQuestions));
      return questionBank[chosen];
    }

    function openQuestion(power) {
      state.paused = true;
      state.currentQuestion = { data: pickQuestion(), power };
      const q = state.currentQuestion.data;
      questionMeta.textContent = `第 ${state.level} 關｜${q.topic}`;
      questionText.textContent = q.q;
      optionsEl.innerHTML = "";
      feedbackEl.className = "feedback";
      feedbackEl.innerHTML = "";
      continueBtn.classList.add("hidden");
      q.options.forEach((text, i) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = `${String.fromCharCode(65 + i)}. ${text}`;
        btn.onclick = () => answerQuestion(i);
        optionsEl.appendChild(btn);
      });
      questionOverlay.classList.remove("hidden");
    }

    function answerQuestion(i) {
      const q = state.currentQuestion.data;
      [...document.querySelectorAll(".option-btn")].forEach((btn, index) => {
        btn.disabled = true;
        if (index === q.answer) btn.classList.add("correct");
        if (index === i && index !== q.answer) btn.classList.add("wrong");
      });
      state.lastAnswerCorrect = i === q.answer;
      if (state.lastAnswerCorrect) { state.powerGot++; state.score += 100; feedbackEl.innerHTML = `<h3>答對了！</h3><p>${q.explain}</p>`; }
      else { feedbackEl.innerHTML = `<h3>答錯了，正確答案是 ${String.fromCharCode(65 + q.answer)}。</h3><p>${q.explain}</p><p class="muted">這個發光膠囊會移到較遠的位置。</p>`; }
      feedbackEl.classList.add("show");
      continueBtn.classList.remove("hidden");
      updateHUD();
    }

    function relocatePower(power) {
      const used = state.powers
        .filter(p => p.active)
        .map(p => `${p.c},${p.r}`);
      const playerCell = cellOf(state.player);
      const corners = [nearestOpen(17, 1), nearestOpen(1, 17), nearestOpen(17, 17), nearestOpen(3, 15), nearestOpen(15, 3)];
      let candidates = openCells()
        .filter(cell => Math.abs(cell.c - playerCell.c) + Math.abs(cell.r - playerCell.r) >= 12)
        .filter(cell => !used.includes(`${cell.c},${cell.r}`));

      if (!candidates.length) {
        candidates = openCells().filter(cell => !used.includes(`${cell.c},${cell.r}`));
      }

      let best = candidates[0] || nearestOpen(17, 17);
      let bestScore = -Infinity;
      for (const cell of candidates) {
        const distPlayer = Math.abs(cell.c - playerCell.c) + Math.abs(cell.r - playerCell.r);
        const distCorner = Math.min(...corners.map(c => Math.abs(c.c - cell.c) + Math.abs(c.r - cell.r)));
        const distOtherPowers = state.powers
          .filter(p => p !== power && p.active)
          .map(p => Math.abs(p.c - cell.c) + Math.abs(p.r - cell.r));
        const minOther = distOtherPowers.length ? Math.min(...distOtherPowers) : 10;
        const score = distPlayer * 2 + minOther * 2 - distCorner + Math.random();
        if (score > bestScore) { bestScore = score; best = cell; }
      }
      power.c = best.c;
      power.r = best.r;
      power.active = true;
      power.pulse = Math.random() * 10;
      state.dots.delete(`${best.c},${best.r}`);
    }

    continueBtn.onclick = () => {
      const power = state.currentQuestion.power;
      questionOverlay.classList.add("hidden");
      if (!state.lastAnswerCorrect) {
        relocatePower(power);
      }
      state.currentQuestion = null;
      if (state.powerGot >= levels[state.level - 1].need) {
        if (state.level >= 3) endGame(true);
        else { state.level++; resetLevel(); state.paused = false; focusCanvas(); }
      } else { state.paused = false; focusCanvas(); }
    };

    function endGame(success) {
      state.running = false;
      state.paused = true;
      resultTitle.textContent = success ? "挑戰成功！" : "挑戰失敗！";
      resultText.innerHTML = success ? `你完成三關挑戰，總分 <b>${state.score}</b> 分。` : `碰到病菌怪了，遊戲結束。可以重新挑戰。`;
      resultOverlay.classList.remove("hidden");
    }

    function focusCanvas() { setTimeout(() => { window.focus(); canvas.focus(); }, 0); }

    function handleKey(e) {
      const key = e.key || "";
      const code = e.keyCode || e.which;
      const map = {
        ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
        w: "up", W: "up", a: "left", A: "left", s: "down", S: "down", d: "right", D: "right",
        38: "up", 40: "down", 37: "left", 39: "right", 87: "up", 65: "left", 83: "down", 68: "right"
      };
      const dir = map[key] || map[code];
      if (dir) { e.preventDefault(); e.stopPropagation(); setDirection(dir); return false; }
    }
    window.addEventListener("keydown", handleKey, true);
    document.addEventListener("keydown", handleKey, true);
    canvas.addEventListener("keydown", handleKey, true);
    canvas.addEventListener("click", focusCanvas);

    document.getElementById("startGameBtn").onclick = () => {
      resize();
      state.level = 1;
      state.score = 0;
      state.powerGot = 0;
      state.usedQuestions.clear();
      state.running = true;
      state.paused = false;
      resetLevel();
      startOverlay.classList.add("hidden");
      focusCanvas();
    };

    document.getElementById("restartBtn").onclick = () => {
      resultOverlay.classList.add("hidden");
      startOverlay.classList.remove("hidden");
      state.running = false;
      state.paused = true;
      state.level = 1;
      state.score = 0;
      state.powerGot = 0;
      state.usedQuestions.clear();
      resetLevel();
      updateHUD();
    };

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawBackground(t) {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      for (let i = 0; i < 28; i++) {
        const x = (i * 97 + t * 0.012) % window.innerWidth;
        const y = (i * 53 + Math.sin(t / 900 + i) * 18 + 80) % window.innerHeight;
        ctx.strokeStyle = "rgba(125,211,252,.16)";
        ctx.beginPath(); ctx.arc(x, y, 3 + (i % 4), 0, Math.PI * 2); ctx.stroke();
      }
    }

    function drawMaze() {
      for (let r = 0; r < maze.length; r++) {
        for (let c = 0; c < maze[0].length; c++) {
          if (maze[r][c] === "#") {
            const x = px(c), y = py(r);
            const grad = ctx.createLinearGradient(x, y, x + state.cell, y + state.cell);
            grad.addColorStop(0, "#1d4ed8"); grad.addColorStop(1, "#0284c7");
            ctx.fillStyle = grad;
            roundRect(x + 2, y + 2, state.cell - 4, state.cell - 4, 8);
            ctx.fill();
            ctx.strokeStyle = "rgba(125,211,252,.38)"; ctx.stroke();
          }
        }
      }
    }

    function drawDots() {
      ctx.fillStyle = "rgba(250,250,210,.92)";
      for (const key of state.dots) {
        const [c, r] = key.split(",").map(Number);
        const x = px(c + 0.5), y = py(r + 0.5);
        const outer = Math.max(4, state.cell * .13), inner = outer * .45;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const a = -Math.PI / 2 + i * Math.PI / 5;
          const rad = i % 2 === 0 ? outer : inner;
          const sx = x + Math.cos(a) * rad, sy = y + Math.sin(a) * rad;
          if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        }
        ctx.closePath(); ctx.fill();
      }
    }

    function drawPowers(t) {
      for (const p of state.powers) {
        if (!p.active) continue;
        const x = px(p.c + 0.5), y = py(p.r + 0.5);
        const r = state.cell * (0.25 + Math.sin(t / 180 + p.pulse) * 0.035);
        const glow = ctx.createRadialGradient(x, y, 2, x, y, r * 2.1);
        glow.addColorStop(0, "rgba(255,255,255,.95)"); glow.addColorStop(.45, "rgba(34,211,238,.75)"); glow.addColorStop(1, "rgba(34,211,238,0)");
        ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(x, y, r * 2.1, 0, Math.PI * 2); ctx.fill();
        ctx.save(); ctx.translate(x, y); ctx.rotate(Math.sin(t / 420 + p.pulse) * .22);
        ctx.fillStyle = "#22d3ee"; roundRect(-r * 1.45, -r * .62, r * 2.9, r * 1.24, r * .62); ctx.fill();
        ctx.fillStyle = "#f8fafc"; roundRect(-r * 1.45, -r * .62, r * 1.45, r * 1.24, r * .62); ctx.fill();
        ctx.strokeStyle = "rgba(15,23,42,.45)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, -r * .58); ctx.lineTo(0, r * .58); ctx.stroke(); ctx.restore();
      }
    }

    function drawPlayer() {
      const p = state.player;
      const x = px(p.x), y = py(p.y) + Math.sin(p.anim * 1.6) * 2;
      const r = state.cell * .38;
      ctx.save(); ctx.translate(x, y);
      ctx.fillStyle = "#34d399"; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#dcfce7"; ctx.beginPath(); ctx.arc(0, r * .1, r * .58, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#0f172a"; ctx.beginPath(); ctx.arc(-r*.23, -r*.08, r*.08, 0, Math.PI*2); ctx.arc(r*.23, -r*.08, r*.08, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#0f172a"; ctx.lineWidth = Math.max(2, state.cell*.04); ctx.beginPath(); ctx.arc(0, r*.08, r*.22, .15, Math.PI-.15); ctx.stroke();
      ctx.fillStyle = "#f8fafc"; roundRect(-r*.45, -r*1.05, r*.9, r*.36, r*.12); ctx.fill();
      ctx.fillStyle = "#ef4444"; ctx.fillRect(-r*.07, -r*.99, r*.14, r*.24); ctx.fillRect(-r*.18, -r*.9, r*.36, r*.08);
      ctx.restore();
    }

    function drawGhosts(t) {
      const colors = ["#fb7185", "#a78bfa", "#f97316", "#22c55e"];
      for (const g of state.ghosts) {
        const x = px(g.x), y = py(g.y), r = state.cell * .34, type = g.type % 4, color = colors[type];
        ctx.save(); ctx.translate(x, y); ctx.rotate(Math.sin(t / 520 + g.type) * .1);
        if (type === 0) {
          ctx.strokeStyle = color; ctx.lineWidth = Math.max(2, state.cell * .045);
          for (let i = 0; i < 10; i++) {
            const a = i * Math.PI * 2 / 10;
            ctx.beginPath(); ctx.moveTo(Math.cos(a)*r*.82, Math.sin(a)*r*.82); ctx.lineTo(Math.cos(a)*r*1.22, Math.sin(a)*r*1.22); ctx.stroke();
            ctx.beginPath(); ctx.arc(Math.cos(a)*r*1.22, Math.sin(a)*r*1.22, r*.1, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
          }
          ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
        } else if (type === 1) {
          ctx.fillStyle = color; roundRect(-r*1.25, -r*.62, r*2.5, r*1.24, r*.62); ctx.fill();
        } else if (type === 2) {
          ctx.fillStyle = color; roundRect(-r*1.05, -r*.58, r*2.1, r*1.16, r*.58); ctx.fill();
          ctx.fillStyle = "#f8fafc"; roundRect(-r*1.05, -r*.58, r*1.05, r*1.16, r*.58); ctx.fill();
        } else {
          ctx.fillStyle = color; ctx.beginPath(); ctx.ellipse(0, 0, r*1.05, r*.88, .25, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,.38)"; ctx.beginPath(); ctx.arc(-r*.38, -r*.28, r*.18, 0, Math.PI*2); ctx.arc(r*.34, r*.26, r*.14, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = "rgba(255,255,255,.92)"; ctx.beginPath(); ctx.arc(-r*.28,-r*.12,r*.17,0,Math.PI*2); ctx.arc(r*.28,-r*.12,r*.17,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = "#0f172a"; ctx.beginPath(); ctx.arc(-r*.23 + g.dir.x*2,-r*.1 + g.dir.y*2,r*.065,0,Math.PI*2); ctx.arc(r*.33 + g.dir.x*2,-r*.1 + g.dir.y*2,r*.065,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    function loop(time) {
      const dt = Math.min(0.033, (time - state.lastTime || 16) / 1000);
      state.lastTime = time;
      drawBackground(time);
      drawMaze();
      if (state.running && !state.paused) {
        moveEntity(state.player, dt);
        state.player.anim += dt * 8;
        moveGhosts(dt);
        checkCollectibles();
        checkCollision();
      }
      drawDots(); drawPowers(time); if (state.player) drawPlayer(); drawGhosts(time);
      requestAnimationFrame(loop);
    }

    resetLevel();
    requestAnimationFrame(loop);
  </script>
